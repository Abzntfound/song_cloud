<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>Living Water</title>
        <link rel="icon" type="image/jpeg" href="favicon.ico">
        <style>
        body {font-family: Arial, sans-serif; margin: 20px; text-align: center; margin-top: 6rem;}
        h1 {font-size: 2rem; stroke-width: 0.3rem;}
        p {font-size: 3rem; justify-content: center; text-align: center;}
        footer {background-color: black; color: white; bottom: 0; left: 0; width: 100%; text-align: center; padding: 5px;}
        #song {border: 0.6rem black; padding: 10px;}

        #song .lyrics {
            font-weight: bold;
        }
        </style>
    </head>
    <body>
        <div id="song">
            <p class="lyrics">
Let Your living water flow over my soul<br>
Let Your Holy Spirit come and take control<br>
Of every situation that has troubled my mind<br>
All my cares and burdens on to You, I roll<br>
Jesus, Jesus, Jesus<br>
Sing to the Father<br>
Father, Father, Father<br>
Holy Spirit<br>
Spirit, Spirit, Spirit<br>
            </p>
        </div>
    </body>
</html>
